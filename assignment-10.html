<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirana Sahayak</title>
</head>
<body>
    <h1>Kirana Sahayak</h1>
    <input type="text" id="input" placeholder="Ask Gemini..."><br><br>
    <button id="btn">ask</button>
    <div id="msg"></div>
    
</body>
<script>
    let button= document.querySelector("#btn");
    let chat= document.querySelector("#msg");
    const MASTER_PROMPT = "You are an AI assistant for a small Indian kirana store owner.The owner talks in simple Hindi or Hinglish.Understand short or broken sentences.Your job:1. Track daily sales2. Track stock items3. Track profit4. Track udhaar (credit given to customers)Rules:- Always respond in simple Hindi or Hinglish- Use very short sentences- Never use technical or difficult words- Be clear and practical- If owner asks for summary, give short bullet points- If owner records a sale, update total- If owner records udhaar, remember the name and amountExample style:Owner: aaj 2000 ki sale hui  You: Thik hai. Aaj ki sale ₹2000 add ho gayi.Owner: Ramesh ko 500 udhaar diya  You: Note kar liya. Ramesh par ₹500 udhaar hai.Owner: aaj ka summary  You:• Total sale: ₹XXXX  • Udhaar: ₹XXXX  • Profit: ₹XXXX Keep answers maximum 1–2 lines unless summary is asked.";
    button.onclick = async function(){
        let userText = document.getElementById("input").value;
        if(userText === ""){return;}
        let p1 = document.createElement("p");
        p1.textContent = "User: " + userText;
        chat.appendChild(p1);
        input.value = "";
        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=AIzaSyBxfORmTX4_tJu39GMIzYZyhqdaMvbv7cs`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ //converts js object to json string
                    contents: [
                        {
                            parts: [{ text:MASTER_PROMPT  }]
                        },
                        {
                            parts: [{ text: userText }],
                        },
                    ],
                }), 
            },
        );
        const data = await response.json();
        let reply = data.candidates[0].content.parts[0].text;
        let p2 = document.createElement("p");
        p2.textContent = "Gemini: " + reply;
        chat.appendChild(p2);
    }

</script>
</html>
