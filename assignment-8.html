<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --sand: #f5efe6;
    --cream: #fdf8f2;
    --clay: #c9a882;
    --rust: #bf5c3a;
    --ink: #1c1410;
    --ink2: #3d2e22;
    --mist: #8b7d6f;
    --surface: #ffffff;
    --border: rgba(201,168,130,0.25);
    --shadow: rgba(28,20,16,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }

  .stripe {
    height: 4px;
    background: linear-gradient(90deg, var(--clay), var(--rust), var(--clay));
  }

  header {
    padding: 52px 40px 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    max-width: 1100px;
    margin: 0 auto;
    gap: 24px;
    flex-wrap: wrap;
  }

  .brand { display: flex; flex-direction: column; gap: 6px; }

  .issue-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--rust);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 5vw, 58px);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -1px;
    color: var(--ink);
  }

  h1 em { font-style: italic; color: var(--rust); }

  .search-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-end;
  }

  .search-hint { font-size: 11px; color: var(--mist); letter-spacing: 0.5px; }

  .autocomplete { position: relative; z-index: 50; }

  .search-row {
    display: flex;
    border: 1.5px solid var(--clay);
    border-radius: 4px;
    overflow: hidden;
    background: white;
  }

  .search-row input {
    border: none;
    outline: none;
    padding: 11px 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: transparent;
    width: 220px;
  }

  .search-row input::placeholder { color: var(--mist); }

  .search-row button {
    border: none;
    background: var(--rust);
    color: white;
    padding: 11px 20px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .search-row button:hover { background: var(--ink2); }

  .dropdown {
    position: absolute;
    top: 100%; right: 0;
    width: 100%; min-width: 280px;
    background: white;
    border: 1.5px solid var(--clay);
    border-top: none;
    border-radius: 0 0 4px 4px;
    box-shadow: 0 8px 24px var(--shadow);
    overflow: hidden;
    display: none;
  }

  .dropdown.show { display: block; }

  .dropdown-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 13px;
    color: var(--ink);
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: var(--sand); }
  .dropdown-item .city-main { font-weight: 500; }
  .dropdown-item .city-sub { font-size: 11px; color: var(--mist); flex-shrink: 0; }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 40px 80px;
  }

  .section-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .section-meta .count {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--mist);
  }

  .section-meta .line { flex: 1; height: 1px; background: var(--border); }
  .section-meta .time { font-size: 11px; color: var(--mist); letter-spacing: 0.5px; }

  #weather {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 2px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(16px);
    animation: reveal 0.5s ease forwards;
    transition: box-shadow 0.25s ease, transform 0.25s ease;
  }

  @keyframes reveal { to { opacity: 1; transform: translateY(0); } }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px var(--shadow);
    z-index: 2;
  }

  .card-remove {
    position: absolute;
    top: 10px; right: 10px;
    background: none;
    border: none;
    color: var(--mist);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
  }

  .card:hover .card-remove { opacity: 1; }
  .card-remove:hover { color: var(--rust); }

  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 0;
    background: var(--rust);
    transition: height 0.3s ease;
  }

  .card:hover::after { height: 100%; }

  .card-country {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--clay);
    margin-bottom: 4px;
  }

  .card-city {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 20px;
  }

  .card-emoji { font-size: 44px; line-height: 1; display: block; margin-bottom: 12px; }

  .card-temp {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -3px;
    color: var(--ink);
  }

  .card-temp sup {
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0;
    vertical-align: super;
    color: var(--mist);
  }

  .card-condition {
    font-size: 12px;
    font-weight: 600;
    color: var(--rust);
    margin-top: 4px;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .card-divider { height: 1px; background: var(--border); margin-bottom: 16px; }

  .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mist); font-weight: 600; }
  .stat-val { font-size: 14px; font-weight: 500; color: var(--ink2); }

  /* Skeleton */
  .skeleton-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px 24px 24px;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .skel { background: var(--sand); border-radius: 3px; margin-bottom: 8px; }
  .skel-xs { height: 10px; width: 55%; }
  .skel-sm { height: 22px; width: 75%; margin-bottom: 20px; }
  .skel-ico { height: 44px; width: 44px; border-radius: 8px; margin-bottom: 12px; }
  .skel-lg { height: 52px; width: 45%; margin-bottom: 4px; }
  .skel-cond { height: 12px; width: 60%; margin-bottom: 20px; }

  /* Empty */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 40px;
    color: var(--mist);
  }

  .empty-state .big-emoji { font-size: 56px; margin-bottom: 16px; display: block; }
  .empty-state p { font-size: 15px; line-height: 1.7; }
  .empty-state strong { color: var(--clay); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: #fff;
    padding: 12px 24px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    white-space: nowrap;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 640px) {
    header { padding: 32px 20px 28px; }
    main { padding: 28px 20px 60px; }
    .search-area { align-items: stretch; }
    .search-row input { width: 100%; flex: 1; }
    .dropdown { min-width: unset; }
  }
</style>
</head>

<body>

<div class="stripe"></div>

<header>
  <div class="brand">
    <span class="issue-label">Live Conditions · Open-Meteo</span>
    <h1>The <em>Weather</em><br>Dispatch</h1>
  </div>

  <div class="search-area">
    <span class="search-hint">Search any city worldwide</span>
    <div class="autocomplete">
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="e.g. Tokyo, Paris, Cairo…" autocomplete="off">
        <button id="addBtn">+ Add City</button>
      </div>
      <div class="dropdown" id="dropdown"></div>
    </div>
  </div>
</header>

<main>
  <div class="section-meta">
    <span class="count" id="cityCount">0 cities</span>
    <div class="line"></div>
    <span class="time" id="updateTime">—</span>
  </div>
  <div id="weather">
    <div class="empty-state">
      <span class="big-emoji">🌍</span>
      <p>Search for a city above to get started.<br><strong>Add multiple cities</strong> to compare conditions side by side.</p>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  let cities = [];
  let cardCounter = 0;
  let debounceTimer = null;

  const input     = document.getElementById('searchInput');
  const addBtn    = document.getElementById('addBtn');
  const dropdown  = document.getElementById('dropdown');
  const weatherEl = document.getElementById('weather');
  const countEl   = document.getElementById('cityCount');
  const timeEl    = document.getElementById('updateTime');

  // ── Geocoding API ─────────────────────────────────────────────────────
  // https://geocoding-api.open-meteo.com/v1/search
  async function geocodeSearch(query) {
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=en`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Geocoding failed');
    const data = await res.json();
    return data.results || [];
  }

  // ── Forecast API ──────────────────────────────────────────────────────
  // Uses current weather variables from the Forecast API.
  // For multiple cities we use Promise.all (free-tier compatible).
  async function fetchWeather(lat, lon) {
    const params = new URLSearchParams({
      latitude: lat,
      longitude: lon,
      current: [
        'temperature_2m',
        'apparent_temperature',
        'relative_humidity_2m',
        'wind_speed_10m',
        'wind_direction_10m',
        'weather_code',
        'precipitation',
        'is_day'
      ].join(','),
      wind_speed_unit: 'kmh',
      temperature_unit: 'celsius',
      timezone: 'auto'
    });
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
    if (!res.ok) throw new Error('Forecast fetch failed');
    return res.json();
  }

  // ── Weather helpers ───────────────────────────────────────────────────
  function weatherEmoji(code, isDay) {
    if (code === 0)  return isDay ? '☀️' : '🌕';
    if (code <= 2)   return isDay ? '🌤️' : '🌙';
    if (code === 3)  return '☁️';
    if (code <= 48)  return '🌫️';
    if (code <= 55)  return '🌦️';
    if (code <= 67)  return '🌧️';
    if (code <= 77)  return '❄️';
    if (code <= 82)  return '🌦️';
    if (code <= 86)  return '🌨️';
    return '⛈️';
  }

  function conditionText(code) {
    if (code === 0)  return 'Clear Sky';
    if (code <= 2)   return 'Partly Cloudy';
    if (code === 3)  return 'Overcast';
    if (code <= 48)  return 'Foggy';
    if (code <= 51)  return 'Light Drizzle';
    if (code <= 55)  return 'Drizzle';
    if (code <= 57)  return 'Freezing Drizzle';
    if (code <= 61)  return 'Light Rain';
    if (code <= 65)  return 'Rain';
    if (code <= 67)  return 'Freezing Rain';
    if (code <= 71)  return 'Light Snow';
    if (code <= 75)  return 'Snow';
    if (code === 77) return 'Snow Grains';
    if (code <= 82)  return 'Rain Showers';
    if (code <= 86)  return 'Snow Showers';
    if (code === 95) return 'Thunderstorm';
    return 'Severe Storm';
  }

  function windDir(deg) {
    return ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg / 45) % 8];
  }

  // ── Autocomplete ──────────────────────────────────────────────────────
  input.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const q = input.value.trim();
    if (q.length < 2) { hideDropdown(); return; }
    debounceTimer = setTimeout(async () => {
      try {
        const results = await geocodeSearch(q);
        showDropdown(results);
      } catch { hideDropdown(); }
    }, 300);
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') addBtn.click();
    if (e.key === 'Escape') hideDropdown();
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.autocomplete')) hideDropdown();
  });

  function showDropdown(results) {
    if (!results.length) { hideDropdown(); return; }
    dropdown.innerHTML = results.map(r => `
      <div class="dropdown-item"
           data-name="${r.name}"
           data-country="${r.country || ''}"
           data-lat="${r.latitude}"
           data-lon="${r.longitude}">
        <span class="city-main">${r.name}${r.admin1 ? ', ' + r.admin1 : ''}</span>
        <span class="city-sub">${r.country_code || ''}</span>
      </div>
    `).join('');
    dropdown.classList.add('show');

    dropdown.querySelectorAll('.dropdown-item').forEach(el => {
      el.addEventListener('click', () => {
        addCity({
          name: el.dataset.name,
          country: el.dataset.country,
          lat: parseFloat(el.dataset.lat),
          lon: parseFloat(el.dataset.lon)
        });
        input.value = '';
        hideDropdown();
      });
    });
  }

  function hideDropdown() {
    dropdown.classList.remove('show');
    dropdown.innerHTML = '';
  }

  // Add via button (first geocoding result)
  addBtn.addEventListener('click', async () => {
    const q = input.value.trim();
    if (!q) return;
    try {
      const results = await geocodeSearch(q);
      if (!results.length) { showToast('City not found — try a different name.'); return; }
      const r = results[0];
      addCity({ name: r.name, country: r.country || '', lat: r.latitude, lon: r.longitude });
      input.value = '';
      hideDropdown();
    } catch { showToast('Search failed. Please try again.'); }
  });

  // ── City logic ────────────────────────────────────────────────────────
  function addCity(city) {
    const dup = cities.find(c => Math.abs(c.lat - city.lat) < 0.02);
    if (dup) { showToast(`${city.name} is already on the board.`); return; }

    // Remove empty state if present
    const es = weatherEl.querySelector('.empty-state');
    if (es) es.remove();

    const id = `card-${cardCounter++}`;
    city._id = id;
    cities.push(city);

    // Insert skeleton immediately
    const skel = document.createElement('div');
    skel.className = 'skeleton-card';
    skel.id = id;
    skel.innerHTML = `
      <div class="skel skel-xs"></div>
      <div class="skel skel-sm"></div>
      <div class="skel skel-ico"></div>
      <div class="skel skel-lg"></div>
      <div class="skel skel-cond"></div>
    `;
    weatherEl.appendChild(skel);
    updateMeta();

    // Fetch weather for this city
    fetchWeather(city.lat, city.lon)
      .then(data => renderCard(id, city, data.current))
      .catch(() => {
        document.getElementById(id)?.remove();
        cities = cities.filter(c => c._id !== id);
        showToast('Could not load weather for ' + city.name);
        updateMeta();
        checkEmpty();
      });
  }

  function renderCard(id, city, c) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'card';
    el.innerHTML = `
      <button class="card-remove" title="Remove city">✕</button>
      <div class="card-country">${city.country}</div>
      <div class="card-city">${city.name}</div>
      <span class="card-emoji">${weatherEmoji(c.weather_code, c.is_day)}</span>
      <div class="card-temp">${Math.round(c.temperature_2m)}<sup>°C</sup></div>
      <div class="card-condition">${conditionText(c.weather_code)}</div>
      <div class="card-divider"></div>
      <div class="card-stats">
        <div class="stat">
          <span class="stat-label">Feels Like</span>
          <span class="stat-val">${Math.round(c.apparent_temperature)}°C</span>
        </div>
        <div class="stat">
          <span class="stat-label">Humidity</span>
          <span class="stat-val">${c.relative_humidity_2m}%</span>
        </div>
        <div class="stat">
          <span class="stat-label">Wind</span>
          <span class="stat-val">${Math.round(c.wind_speed_10m)} km/h ${windDir(c.wind_direction_10m)}</span>
        </div>
        <div class="stat">
          <span class="stat-label">Precip.</span>
          <span class="stat-val">${c.precipitation} mm</span>
        </div>
      </div>
    `;

    el.querySelector('.card-remove').addEventListener('click', () => {
      el.style.animation = 'none';
      el.style.transition = 'opacity 0.25s, transform 0.25s';
      el.style.opacity = '0';
      el.style.transform = 'scale(0.95)';
      setTimeout(() => {
        el.remove();
        cities = cities.filter(c => c._id !== id);
        updateMeta();
        checkEmpty();
      }, 250);
    });

    updateTime();
  }

  function checkEmpty() {
    if (weatherEl.children.length === 0) {
      weatherEl.innerHTML = `
        <div class="empty-state">
          <span class="big-emoji">🌍</span>
          <p>Search for a city above to get started.<br><strong>Add multiple cities</strong> to compare conditions side by side.</p>
        </div>`;
    }
  }

  function updateMeta() {
    countEl.textContent = `${cities.length} ${cities.length === 1 ? 'city' : 'cities'}`;
  }

  function updateTime() {
    const now = new Date();
    timeEl.textContent = `Updated ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
  }

  // ── Toast ─────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
  }

  // ── Defaults: Promise.all for 3 cities ────────────────────────────────
  const defaults = [
    { name: 'Delhi',     country: 'India', lat: 28.6139, lon: 77.2090 },
    { name: 'Mumbai',    country: 'India', lat: 19.0760, lon: 72.8777 },
    { name: 'Bangalore', country: 'India', lat: 12.9716, lon: 77.5946 },
  ];

  // Remove empty state before batch load
  weatherEl.innerHTML = '';

  // Attach skeletons for all 3 first, then fetch simultaneously with Promise.all
  const defaultIds = defaults.map(city => {
    const id = `card-${cardCounter++}`;
    city._id = id;
    cities.push(city);
    const skel = document.createElement('div');
    skel.className = 'skeleton-card';
    skel.id = id;
    skel.innerHTML = `
      <div class="skel skel-xs"></div>
      <div class="skel skel-sm"></div>
      <div class="skel skel-ico"></div>
      <div class="skel skel-lg"></div>
      <div class="skel skel-cond"></div>
    `;
    weatherEl.appendChild(skel);
    return id;
  });

  updateMeta();

  Promise.all(defaults.map(c => fetchWeather(c.lat, c.lon)))
    .then(results => {
      results.forEach((data, i) => renderCard(defaultIds[i], defaults[i], data.current));
    })
    .catch(() => showToast('Some cities failed to load. Please refresh.'));
</script>

</body>
</html>
